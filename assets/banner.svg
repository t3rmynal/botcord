<svg width="820" height="200" viewBox="0 0 820 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="shimmer" x1="0" y1="0" x2="1" y2="0" gradientUnits="objectBoundingBox">
      <stop offset="0" stop-color="#999999"/>
      <stop offset="0.5" stop-color="#e8e8e8"/>
      <stop offset="1" stop-color="#999999"/>
    </linearGradient>
    <pattern id="scan" width="3" height="3" patternUnits="userSpaceOnUse">
      <rect width="3" height="1" fill="#ffffff" opacity="0.022"/>
    </pattern>
    <clipPath id="frame">
      <rect width="820" height="200" rx="14"/>
    </clipPath>
  </defs>

  <g clip-path="url(#frame)">
    <rect width="820" height="200" fill="#000000"/>

    <!-- network constellation background -->
    <g stroke="#ffffff" stroke-opacity="0.09" stroke-width="1">
      <line x1="70" y1="48" x2="140" y2="82"/>
      <line x1="140" y1="82" x2="155" y2="128"/>
      <line x1="155" y1="128" x2="60" y2="132"/>
      <line x1="60" y1="132" x2="120" y2="168"/>
      <line x1="155" y1="128" x2="215" y2="142"/>
      <line x1="140" y1="82" x2="60" y2="132"/>
      <line x1="200" y1="52" x2="290" y2="92"/>
      <line x1="200" y1="52" x2="140" y2="82"/>
      <line x1="610" y1="60" x2="700" y2="46"/>
      <line x1="700" y1="46" x2="765" y2="96"/>
      <line x1="765" y1="96" x2="690" y2="140"/>
      <line x1="690" y1="140" x2="620" y2="170"/>
      <line x1="620" y1="170" x2="560" y2="152"/>
      <line x1="690" y1="140" x2="745" y2="168"/>
      <line x1="525" y1="86" x2="610" y2="60"/>
      <line x1="525" y1="86" x2="560" y2="152"/>

      <g fill="#ffffff" stroke="none" fill-opacity="0.5">
        <circle cx="70" cy="48" r="1.6"/>
        <circle cx="140" cy="82" r="1.6"/>
        <circle cx="60" cy="132" r="1.6"/>
        <circle cx="120" cy="168" r="1.6"/>
        <circle cx="200" cy="52" r="1.6"/>
        <circle cx="215" cy="142" r="1.6"/>
        <circle cx="290" cy="92" r="1.6"/>
        <circle cx="525" cy="86" r="1.6"/>
        <circle cx="610" cy="60" r="1.6"/>
        <circle cx="700" cy="46" r="1.6"/>
        <circle cx="765" cy="96" r="1.6"/>
        <circle cx="690" cy="140" r="1.6"/>
        <circle cx="620" cy="170" r="1.6"/>
        <circle cx="560" cy="152" r="1.6"/>
        <circle cx="745" cy="168" r="1.6"/>
        <circle cx="155" cy="128" r="1.6"/>
      </g>
    </g>

    <!-- hero wordmark with subtle shimmer gradient -->
    <text x="410" y="108" text-anchor="middle"
      font-family="'JetBrains Mono','SF Mono',ui-monospace,monospace"
      font-size="60" font-weight="700" letter-spacing="-1" fill="url(#shimmer)">botcord</text>

    <!-- tagline -->
    <text x="410" y="150" text-anchor="middle"
      font-family="'JetBrains Mono','SF Mono',ui-monospace,monospace"
      font-size="12" letter-spacing="5" fill="#5e5e5e">discord account automation toolkit</text>

    <rect width="820" height="200" fill="url(#scan)"/>
    <rect x="0.5" y="0.5" width="819" height="199" rx="14" fill="none" stroke="#1e1e1e" stroke-width="1"/>
  </g>
</svg>
