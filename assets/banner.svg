<svg width="820" height="240" viewBox="0 0 820 240" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="820" y2="240" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0b0d12"/>
      <stop offset="1" stop-color="#12151d"/>
    </linearGradient>
    <linearGradient id="wm" x1="240" y1="100" x2="580" y2="150" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#a5b4fc"/>
      <stop offset="1" stop-color="#6366f1"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#6366f1" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="820" height="240" rx="16" fill="url(#bg)"/>
  <ellipse cx="410" cy="120" rx="320" ry="150" fill="url(#glow)"/>

  <!-- wordmark -->
  <text x="410" y="128" text-anchor="middle"
    font-family="'Segoe UI',system-ui,-apple-system,BlinkMacSystemFont,sans-serif"
    font-size="76" font-weight="800" letter-spacing="-2" fill="url(#wm)">botcord</text>

  <!-- animated underline -->
  <rect x="290" y="150" height="3" rx="1.5" fill="#6366f1" width="0">
    <animate attributeName="width" from="0" to="240" dur="0.9s" begin="0.3s" fill="freeze"/>
    <animate attributeName="x" from="410" to="290" dur="0.9s" begin="0.3s" fill="freeze"/>
  </rect>

  <!-- tagline -->
  <text x="410" y="188" text-anchor="middle"
    font-family="'Segoe UI',system-ui,-apple-system,BlinkMacSystemFont,sans-serif"
    font-size="16" font-weight="400" letter-spacing="3" fill="#8b94a8" opacity="0">
    LOCAL DISCORD ACCOUNT TOOLKIT
    <animate attributeName="opacity" from="0" to="1" dur="0.8s" begin="1.1s" fill="freeze"/>
  </text>
</svg>
