<svg width="820" height="220" viewBox="0 0 820 220" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- silver shimmer sweep, same as the app's ShimmerText -->
    <linearGradient id="shimmer" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#6a6a6a"/>
      <stop offset="0.42" stop-color="#6a6a6a"/>
      <stop offset="0.5" stop-color="#ffffff"/>
      <stop offset="0.58" stop-color="#6a6a6a"/>
      <stop offset="1" stop-color="#6a6a6a"/>
      <animateTransform attributeName="gradientTransform" type="translate"
        values="-1 0;1 0" dur="3.2s" repeatCount="indefinite"/>
    </linearGradient>
    <!-- crt scanlines -->
    <pattern id="scan" width="3" height="3" patternUnits="userSpaceOnUse">
      <rect width="3" height="1" fill="#ffffff" opacity="0.022"/>
    </pattern>
    <clipPath id="frame">
      <rect width="820" height="220" rx="14"/>
    </clipPath>
  </defs>

  <g clip-path="url(#frame)">
    <!-- pure black bg + thin border, like the app panels -->
    <rect width="820" height="220" fill="#000000"/>

    <!-- network constellation background -->
    <g stroke="#ffffff" stroke-opacity="0.09" stroke-width="1">
      <animateTransform attributeName="transform" type="translate"
        values="0 0; 6 -4; 0 3; 0 0" dur="16s" repeatCount="indefinite"/>
      <line x1="70" y1="55" x2="140" y2="90"/>
      <line x1="140" y1="90" x2="155" y2="135"/>
      <line x1="155" y1="135" x2="60" y2="140"/>
      <line x1="60" y1="140" x2="120" y2="180"/>
      <line x1="155" y1="135" x2="215" y2="150"/>
      <line x1="140" y1="90" x2="60" y2="140"/>
      <line x1="200" y1="60" x2="290" y2="100"/>
      <line x1="200" y1="60" x2="140" y2="90"/>
      <line x1="610" y1="70" x2="700" y2="55"/>
      <line x1="700" y1="55" x2="765" y2="105"/>
      <line x1="765" y1="105" x2="690" y2="150"/>
      <line x1="690" y1="150" x2="620" y2="182"/>
      <line x1="620" y1="182" x2="560" y2="165"/>
      <line x1="690" y1="150" x2="745" y2="180"/>
      <line x1="525" y1="95" x2="610" y2="70"/>
      <line x1="525" y1="95" x2="560" y2="165"/>

      <g fill="#ffffff" stroke="none" fill-opacity="0.5">
        <circle cx="70" cy="55" r="1.6"/>
        <circle cx="140" cy="90" r="1.6"/>
        <circle cx="60" cy="140" r="1.6"/>
        <circle cx="120" cy="180" r="1.6"/>
        <circle cx="200" cy="60" r="1.6"/>
        <circle cx="215" cy="150" r="1.6"/>
        <circle cx="290" cy="100" r="1.6"/>
        <circle cx="525" cy="95" r="1.6"/>
        <circle cx="610" cy="70" r="1.6"/>
        <circle cx="700" cy="55" r="1.6"/>
        <circle cx="765" cy="105" r="1.6"/>
        <circle cx="690" cy="150" r="1.6"/>
        <circle cx="620" cy="182" r="1.6"/>
        <circle cx="560" cy="165" r="1.6"/>
        <circle cx="745" cy="180" r="1.6"/>
        <circle cx="155" cy="135" r="1.6"/>
      </g>
      <!-- a few twinkling nodes -->
      <circle cx="140" cy="90" r="1.8" fill="#ffffff" stroke="none">
        <animate attributeName="fill-opacity" values="0.2;0.9;0.2" dur="4s" repeatCount="indefinite"/>
      </circle>
      <circle cx="700" cy="55" r="1.8" fill="#ffffff" stroke="none">
        <animate attributeName="fill-opacity" values="0.3;1;0.3" dur="5.5s" begin="1s" repeatCount="indefinite"/>
      </circle>
      <circle cx="620" cy="182" r="1.8" fill="#ffffff" stroke="none">
        <animate attributeName="fill-opacity" values="0.2;0.8;0.2" dur="6s" begin="2.5s" repeatCount="indefinite"/>
      </circle>
    </g>

    <!-- faux titlebar, mirrors the app window chrome -->
    <g font-family="'JetBrains Mono','SF Mono',ui-monospace,monospace">
      <rect x="22" y="15" width="6" height="6" fill="#7aff7a"/>
      <text x="36" y="21" font-size="10" letter-spacing="2.2" fill="#7aff7a" opacity="0.85">ONLINE</text>
      <text x="744" y="21" text-anchor="end" font-size="11" letter-spacing="1" fill="#3a3a3a">v0.1.0</text>
      <text x="798" y="21" text-anchor="end" font-size="11" letter-spacing="2" fill="#5e5e5e">— ▢ ×</text>
    </g>
    <line x1="0" y1="33" x2="820" y2="33" stroke="#1e1e1e" stroke-width="1"/>

    <!-- hero wordmark with shimmer -->
    <text x="410" y="128" text-anchor="middle"
      font-family="'JetBrains Mono','SF Mono',ui-monospace,monospace"
      font-size="58" font-weight="700" letter-spacing="-1" fill="url(#shimmer)">botcord</text>

    <!-- tagline -->
    <text x="410" y="168" text-anchor="middle"
      font-family="'JetBrains Mono','SF Mono',ui-monospace,monospace"
      font-size="12.5" letter-spacing="6" fill="#5e5e5e">discord account toolkit</text>

    <!-- scanline overlay on top -->
    <rect width="820" height="220" fill="url(#scan)"/>
    <!-- inner border -->
    <rect x="0.5" y="0.5" width="819" height="219" rx="14" fill="none" stroke="#1e1e1e" stroke-width="1"/>
  </g>
</svg>
